# ============================================================
# Perfil de pruebas (H2 en memoria) — usado por @ActiveProfiles("test")
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true